name: Build — Windows x64 + Linux x64

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build-windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-source/target
          key: windows-cargo-${{ hashFiles('rust-source/Cargo.lock') }}

      - name: Build release (Windows)
        working-directory: rust-source
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Stage artifact
        run: |
          Copy-Item `
            "rust-source/target/x86_64-pc-windows-msvc/release/gillsystems-uneff-your-rigs-messy-files.exe" `
            "gillsystems-uneff-your-rigs-messy-files-windows-x64.exe"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: gillsystems-uneff-windows-x64
          path: gillsystems-uneff-your-rigs-messy-files-windows-x64.exe
          retention-days: 30

  build-linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps (egui/eframe needs these on Linux)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            pkg-config \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libssl-dev \
            libfontconfig1-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust-source/target
          key: linux-cargo-${{ hashFiles('rust-source/Cargo.lock') }}

      - name: Build release (Linux)
        working-directory: rust-source
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Stage artifact
        run: |
          cp rust-source/target/x86_64-unknown-linux-gnu/release/gillsystems-uneff-your-rigs-messy-files \
             gillsystems-uneff-your-rigs-messy-files-linux-x64
          chmod +x gillsystems-uneff-your-rigs-messy-files-linux-x64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: gillsystems-uneff-linux-x64
          path: gillsystems-uneff-your-rigs-messy-files-linux-x64
          retention-days: 30
